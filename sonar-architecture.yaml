# PUIntegra — Architecture Configuration
# Schema: https://docs.sonarsource.com/sonarqube-server/2025.3/design-and-architecture/configuring-the-architecture-analysis
# Property: sonar.architecture.configpath=sonar-architecture.yaml
#
# Three-layer monorepo:
#   shared → Zod schemas + constants (pure contract layer)
#   api    → Cloud Functions + Hono router + Firestore services (backend)
#   web    → Vue 3 SPA + Pinia + Vue Router + Vuestic UI (frontend)
#
# Communication boundary: api ↔ web is REST/HTTP only — never direct imports.

# ─────────────────────────────────────────────────────────────────────────────
# PERSPECTIVES — Formal architecture views with hierarchical groups
# ─────────────────────────────────────────────────────────────────────────────

perspectives:

  # ── Monorepo Packages ─────────────────────────────────────────────────────
  - label: Packages
    description: Top-level monorepo package boundaries (shared → api, web)
    groups:
      - label: Shared
        description: Zod schemas, constants, inferred types — single source of truth
        patterns:
          - "packages/shared/src/**"

      - label: API
        description: Cloud Functions + Hono router + Firestore services
        patterns:
          - "packages/api/src/**"
        groups:
          - label: Functions
            description: Cloud Function handlers — call services and middleware only
            patterns:
              - "packages/api/src/functions/**"
          - label: Middleware
            description: Auth validation — self-contained, no service or handler deps
            patterns:
              - "packages/api/src/middleware/**"
          - label: Services
            description: Firestore/Admin SDK access — sole owner of DB calls
            patterns:
              - "packages/api/src/services/**"

      - label: Web
        description: Vue 3 SPA with Pinia, Vue Router, Vuestic UI
        patterns:
          - "packages/web/src/**"
        groups:
          - label: Pages
            description: Route-level views — call composables, render components
            patterns:
              - "packages/web/src/pages/**"
          - label: Router
            description: Vue Router setup, guards, route metadata
            patterns:
              - "packages/web/src/router/**"
          - label: Stores
            description: Pinia state management — no upward deps
            patterns:
              - "packages/web/src/stores/**"
          - label: Composables
            description: Vue 3 hooks — orchestrate stores, expose reactive data
            patterns:
              - "packages/web/src/composables/**"
          - label: Components
            description: Presentational UI — receive data via props only
            patterns:
              - "packages/web/src/components/**"
          - label: SharedConstants
            description: Web-local constants, navigation catalog, logging
            patterns:
              - "packages/web/src/shared/**"
          - label: BoM
            description: Bill of Materials — centralized re-exports for the web app
            patterns:
              - "packages/web/src/bom.ts"

    # ── Perspective constraints (group-path based) ──────────────────────────
    constraints:
      # Shared is a leaf — must not depend on API or Web
      - message: "Shared is the pure contract layer — it must not import from API or Web"
      - from: ["Shared"]
        to: ["API", "API/**", "Web", "Web/**"]

      # API ↔ Web boundary — REST only, no direct imports
      - message: "API and Web communicate via REST — no cross-package imports"
      - from: ["API", "API/**"]
        to: ["Web", "Web/**"]
      - from: ["Web", "Web/**"]
        to: ["API", "API/**"]

      # API internal layering
      - message: "API services must not depend on handlers (reverse dependency)"
      - from: ["API/Services"]
        to: ["API/Functions"]
      - from: ["API/Services"]
        to: ["API/Middleware"]
      - message: "API middleware must not depend on handlers or services"
      - from: ["API/Middleware"]
        to: ["API/Functions"]
      - from: ["API/Middleware"]
        to: ["API/Services"]

      # Web: components are presentational — no stores, no router
      - message: "Components are presentational — access stores via composables, not directly"
      - from: ["Web/Components"]
        to: ["Web/Stores"]
      - message: "Components must not import router internals"
      - from: ["Web/Components"]
        to: ["Web/Router"]

      # Web: stores must not depend upward
      - message: "Stores must not import from composables, pages, or router (circular)"
      - from: ["Web/Stores"]
        to: ["Web/Composables", "Web/Pages", "Web/Router"]

      # Web: shared constants layer stays pure
      - message: "Web shared constants must not depend on stores, composables, components, or pages"
      - from: ["Web/SharedConstants"]
        to: ["Web/Stores", "Web/Composables", "Web/Components", "Web/Pages"]

# ─────────────────────────────────────────────────────────────────────────────
# TOP-LEVEL CONSTRAINTS — File-path based, outside perspectives
# ─────────────────────────────────────────────────────────────────────────────

constraints:
  # Cross-package: shared must not import api or web
  - message: "Shared must remain pure — no imports from api or web packages"
  - from: ["packages/shared/src/**"]
    to: ["packages/api/src/**"]
  - from: ["packages/shared/src/**"]
    to: ["packages/web/src/**"]

  # Cross-package: api must not import web
  - message: "API must not import frontend code"
  - from: ["packages/api/src/**"]
    to: ["packages/web/src/**"]

  # Cross-package: web must not import api internals
  - message: "Web must not import API internals — use REST boundary"
  - from: ["packages/web/src/**"]
    to: ["packages/api/src/**"]

  # Web components must not import stores directly
  - message: "Components are presentational — pass data via props, not store imports"
  - from: ["packages/web/src/components/**"]
    to: ["packages/web/src/stores/**"]

  # Web stores must not create circular deps via composables or pages
  - message: "Stores must not import composables or pages (prevents circular deps)"
  - from: ["packages/web/src/stores/**"]
    to: ["packages/web/src/composables/**"]
  - from: ["packages/web/src/stores/**"]
    to: ["packages/web/src/pages/**"]

  # API: Firestore/Admin SDK confined to services layer
  - message: "Firestore/Admin SDK calls belong in services/ — not in handlers or middleware"
  - from: ["packages/api/src/functions/**"]
    to: ["packages/api/src/services/**"]
    relation: exclusive-allow
